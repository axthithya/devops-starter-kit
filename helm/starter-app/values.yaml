replicaCount: 1

nameOverride: ""
fullnameOverride: ""

namespace:
  create: false
  name: ""

image:
  repository: axthithya/devops-starter-kit
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

container:
  port: 8080

service:
  type: NodePort
  port: 80
  targetPort: http
  nodePort: null

env: []

resources: {}

probes:
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 2
    failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
