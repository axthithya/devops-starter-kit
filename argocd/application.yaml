apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: starter-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/axthithya/devops-starter-kit.git
    targetRevision: main
    path: helm/starter-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
