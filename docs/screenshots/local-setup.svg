<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Local setup terminal output</title>
  <desc id="desc">Example terminal output for make setup showing dependency, Minikube, ArgoCD, and health checks passing.</desc>
  <rect width="960" height="520" fill="#f6f8fa"/>
  <rect x="48" y="44" width="864" height="432" rx="8" fill="#101418"/>
  <rect x="48" y="44" width="864" height="42" rx="8" fill="#2b3137"/>
  <circle cx="78" cy="65" r="7" fill="#ff5f56"/>
  <circle cx="102" cy="65" r="7" fill="#ffbd2e"/>
  <circle cx="126" cy="65" r="7" fill="#27c93f"/>
  <text x="158" y="71" fill="#d6dde5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">devops-starter-kit</text>
  <text x="76" y="126" fill="#e6edf3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">$ cp .env.example .env</text>
  <text x="76" y="166" fill="#e6edf3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">$ make setup</text>
  <text x="76" y="212" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">==&gt; Checking required local tools</text>
  <text x="76" y="248" fill="#3fb950" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">OK  Java version is compatible: 21.x</text>
  <text x="76" y="284" fill="#3fb950" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">OK  Docker daemon is running</text>
  <text x="76" y="320" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">==&gt; Preparing Minikube profile devops-starter-kit</text>
  <text x="76" y="356" fill="#3fb950" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">OK  Minikube is ready</text>
  <text x="76" y="392" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">==&gt; Installing or updating ArgoCD</text>
  <text x="76" y="428" fill="#3fb950" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">OK  ArgoCD Application starter-app applied</text>
  <text x="76" y="464" fill="#3fb950" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">OK  Setup completed</text>
</svg>
