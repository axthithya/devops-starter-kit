      .label { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .box { fill: #ffffff; stroke: #9aa5b4; stroke-width: 1.5; }
      .arrow { fill: none; stroke: #6b7280; stroke-width: 2.4; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .dashed { fill: none; stroke: #6b7280; stroke-width: 2.2; stroke-dasharray: 8 7; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .trunk { fill: none; stroke: #6b7280; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
